<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data:; connect-src 'self';" />
  <title>Greenbush Logistics — Brokerage Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /*
    ╔══════════════════════════════════════════════╗
    ║  LOGO SETUP                                  ║
    ║  1. Drop your logo file into this folder     ║
    ║     (logo.png, logo.svg, logo.webp, etc.)    ║
    ║  2. Update the src= on the #company-logo img ║
    ║     tag in the HTML below.                   ║
    ║  The SVG truck icon shows as fallback if the ║
    ║  image file is not found.                    ║
    ╚══════════════════════════════════════════════╝
    */

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin: 0; min-height: 100vh;
      background: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* ── Background blobs ── */
    .blob {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
      filter: blur(80px);
    }
    .blob-orange {
      width: 55vw; height: 55vw;
      top: -20%; right: -15%;
      background: radial-gradient(circle, rgba(163,169,52,0.55) 0%, transparent 65%);
    }
    .blob-olive {
      width: 50vw; height: 50vw;
      bottom: -15%; left: -12%;
      background: radial-gradient(circle, rgba(242,105,42,0.45) 0%, transparent 65%);
    }
    .blob-center {
      width: 30vw; height: 30vw;
      top: 35%; left: 35%;
      background: radial-gradient(circle, rgba(163,169,52,0.06) 0%, transparent 70%);
      filter: blur(60px);
    }

    /* ── Glass card ── */
    .glass-card {
      background: rgba(15, 15, 15, 0.55);
      backdrop-filter: blur(28px) saturate(1.6);
      -webkit-backdrop-filter: blur(28px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
    }

    /* ── Input ── */
    .glass-input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      font-size: 0.9375rem;
      color: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .glass-input::placeholder { color: rgba(255,255,255,0.3); }
    .glass-input:focus {
      border-color: #a3a934;
      box-shadow: 0 0 0 3px rgba(163,169,52,0.2);
      background: rgba(255,255,255,0.1);
    }

    /* ── Button ── */
    .btn-primary {
      width: 100%; padding: 0.78rem;
      background: linear-gradient(135deg, #a3a934 0%, #d95518 100%);
      color: #fff; font-weight: 700; font-size: 0.9375rem;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
      box-shadow: 0 4px 20px rgba(163,169,52,0.35);
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.99); }

    /* ── Labels & text ── */
    label.field-label { display: block; font-size: 0.8125rem; font-weight: 600; color: rgba(255,255,255,0.65); margin-bottom: 0.375rem; letter-spacing: 0.01em; }
    /* ── Error box ── */
    .error-box {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.35);
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
    }

    /* ── Lockout box ── */
    .lockout-box {
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.3);
      color: #fcd34d;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
    }

    /* ── Stat bar ── */
    .stat-bar { border-left: 2px solid rgba(163,169,52,0.5); padding-left: 0.875rem; }

    /* ── Eye toggle ── */
    .eye-btn {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.35); padding: 0; line-height: 1;
      transition: color 0.15s;
    }
    .eye-btn:hover { color: rgba(255,255,255,0.7); }

    /* ── Divider ── */
    .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 1.25rem 0; }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="blob blob-orange"></div>
  <div class="blob blob-olive"></div>
  <div class="blob blob-center"></div>

  <!-- Wrapper -->
  <div style="position:relative;z-index:1;width:100%;max-width:440px;padding:1.25rem">

    <!-- Card -->
    <div class="glass-card" style="padding:2.5rem 2.25rem">

      <!-- Logo area -->
      <!-- ↓ Replace "logo.png" with your actual logo filename -->
      <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:2rem">
        <img
          id="company-logo"
          src="logo.png"
          alt="Greenbush Logistics"
          style="height:120px;width:auto;max-width:100%;object-fit:contain;display:block"
          onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'"
        />
        <!-- Fallback shown if logo.png is not found -->
        <div id="logo-fallback" style="display:none;flex-direction:column;align-items:center;gap:0.75rem">
          <div style="width:100px;height:100px;border-radius:24px;background:linear-gradient(135deg,#a3a934,#f2692a);display:flex;align-items:center;justify-content:center">
            <svg style="width:56px;height:56px" fill="none" stroke="white" viewBox="0 0 24 24">
              <rect x="1" y="3" width="15" height="13" rx="1" stroke-width="2"/>
              <polygon points="16,8 20,8 23,11 23,16 16,16 16,8" stroke-width="2" stroke-linejoin="round"/>
              <circle cx="5.5" cy="18.5" r="2.5" stroke-width="2"/>
              <circle cx="18.5" cy="18.5" r="2.5" stroke-width="2"/>
            </svg>
          </div>
          <div style="text-align:center">
            <div style="color:#fff;font-weight:800;font-size:1.25rem;line-height:1.2;letter-spacing:-0.01em">Greenbush Logistics</div>
            <div style="color:rgba(255,255,255,0.4);font-size:0.8rem;margin-top:2px">Brokerage Center</div>
          </div>
        </div>
      </div>

      <!-- Heading -->
      <div style="margin-bottom:1.75rem">
        <h1 style="margin:0;color:#fff;font-size:1.5rem;font-weight:800;letter-spacing:-0.02em">Sign in to your account</h1>
      </div>

      <!-- Form -->
      <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="on">

        <!-- Email -->
        <div style="margin-bottom:1rem">
          <label class="field-label" for="email">Email address</label>
          <input
            id="email" name="email" type="email"
            class="glass-input"
            placeholder="you@company.com"
            value="jcolson@greenbushlogistics.com"
            autocomplete="username"
            required
          />
        </div>

        <!-- Password -->
        <div style="margin-bottom:1rem">
          <div style="margin-bottom:0.375rem">
            <label class="field-label" for="password" style="margin:0">Password</label>
          </div>
          <div style="position:relative">
            <input
              id="password" name="password" type="password"
              class="glass-input" style="padding-right:2.75rem"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="eye-btn" onclick="togglePwd()" aria-label="Toggle password visibility">
              <svg id="eyeOpen" style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-width="2" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3" stroke-width="2"/>
              </svg>
              <svg id="eyeClosed" style="width:18px;height:18px;display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-width="2" stroke-linecap="round" d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Error / lockout message -->
        <div id="alertBox" style="display:none;margin-bottom:1rem"></div>

        <!-- Submit -->
        <button type="submit" class="btn-primary" id="submitBtn">
          <span id="btnText">Sign In</span>
        </button>

      </form>

      <div class="divider"></div>

      <!-- Footer note -->
      <p style="margin:0;text-align:center;color:rgba(255,255,255,0.25);font-size:0.75rem">
        &copy; 2026 Greenbush Logistics
      </p>

    </div>

    <!-- Version tag -->
    <p style="text-align:center;color:rgba(255,255,255,0.18);font-size:0.7rem;margin-top:1rem">v1.0.0</p>

  </div>

  <script>
    // ── Password show/hide ──
    function togglePwd() {
      const f = document.getElementById('password');
      const isText = f.type === 'text';
      f.type = isText ? 'password' : 'text';
      document.getElementById('eyeOpen').style.display  = isText ? 'block' : 'none';
      document.getElementById('eyeClosed').style.display = isText ? 'none'  : 'block';
    }

    // ── Alert helper ──
    function showAlert(html, type) {
      const el = document.getElementById('alertBox');
      el.className = type === 'error' ? 'error-box' : 'lockout-box';
      el.innerHTML = html;
      el.style.display = 'block';
    }
    function hideAlert() { document.getElementById('alertBox').style.display = 'none'; }

    // ── Login handler ──
    async function handleLogin(e) {
      e.preventDefault();
      const emailEl = document.getElementById('email');
      const passEl  = document.getElementById('password');
      const btnText = document.getElementById('btnText');

      hideAlert();
      btnText.textContent = 'Signing in…';
      document.getElementById('submitBtn').disabled = true;

      try {
        const r = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email: emailEl.value.trim().toLowerCase(), password: passEl.value }),
        });
        const data = await r.json();
        if (r.ok) {
          window.location.href = 'app.html';
        } else {
          showAlert(data.error || 'Login failed.', r.status === 429 ? 'lockout' : 'error');
          btnText.textContent = 'Sign In';
          document.getElementById('submitBtn').disabled = false;
          passEl.value = '';
          passEl.focus();
        }
      } catch {
        showAlert('Network error. Please try again.', 'error');
        btnText.textContent = 'Sign In';
        document.getElementById('submitBtn').disabled = false;
      }
    }
  </script>
</body>
</html>
